<!DOCTYPE html>
<html>
<head>
  <title>Crown Podium - Master</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2196f3, #6ec6ff);
      color: white;
      text-align: center;
    }
    h1 { font-size: 50px; margin-top: 20px; }
    button {
      padding: 15px 30px;
      font-size: 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: orange;
      color: white;
      cursor: pointer;
    }
    .ranking { margin-top: 30px; font-size: 22px; }
  </style>
</head>
<body>

<h1>Crown 👑 Podium</h1>
<h2 id="roomCode"></h2>
<button onclick="nextQuestion()">Lancer question</button>
<select id="quizSelect"></select>
<button onclick="loadQuiz()">Choisir quiz</button>
<button onclick="resetGame()">Nouvelle partie</button>
<div id="ranking" class="ranking"></div>



<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBwvGD0hhvka7BW88wg6NRTkKpVDIg18bw",
    authDomain: "crown-podium-64fb5.firebaseapp.com",
    databaseURL: "https://crown-podium-64fb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "crown-podium-64fb5",
    storageBucket: "crown-podium-64fb5.firebasestorage.app",
    messagingSenderId: "893724598521",
    appId: "1:893724598521:web:9695de26ceef1738564228",
    measurementId: "G-MG0ZBYDQXL"
  };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
db.ref("quizzes").once("value", snap => {
  const data = snap.val();
  const select = document.getElementById("quizSelect");

  // sécurité si aucun quiz
  if(!data){
    alert("Aucun quiz trouvé");
    return;
  }

  // vider le menu
  select.innerHTML = "";

  // remplir le menu
  for(let id in data){
    const option = document.createElement("option");
    option.value = id;
    option.text = data[id].title;
    select.appendChild(option);
  }
});

// Générer le code
let roomId = generateRoomId();
document.getElementById("roomCode").innerText = "Code : " + roomId;

// Questions
let questions = [];
let selectedQuiz = null;


// Générer code (fonction)
function generateRoomId() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";
  for (let i = 0; i < 5; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

let currentQ = 0;

// Lancer question (fonction)
function nextQuestion() {
  if (!questions || questions.length === 0) {
    alert("Choisir un quiz");
    return;
  }

  if (currentQ >= questions.length) {
    alert("Fin du quiz");
    return;
  }

  const q = questions[currentQ];
  
  const displayText = "Question " + (currentQ + 1) + " / " + questions.length + "<br><br>" + q.text;  

    
  db.ref("rooms/" + roomId + "/question").set({
    image: q.image || null
    text: displayText,
    answers: q.answers,
    correct: q.correct,
    startTime: Date.now()
  });

  currentQ++;
}

// Rénitialiser (fonction)
function resetGame() {
  db.ref("rooms/" + roomId).remove();
  currentQ = 0;
  roomId = generateRoomId(); // nouveau code
  document.getElementById("roomCode").innerText = "Code : " + roomId;
}

// Charger les questions (fonction)  
function loadQuiz(){
  const id = document.getElementById("quizSelect").value;

  db.ref("quizzes/" + id).once("value", snap => {
    const quiz = snap.val();
    questions = quiz.questions;
    selectedQuiz = id;

    currentQ = 0;
    alert("Quiz chargé");
  });
}
    
// Classement
db.ref("rooms/" + roomId + "/players").on("value", snap => {
  const data = snap.val();
  if(!data) return;

  let players = Object.values(data)
    .filter(p => p.score > 0)
    .sort((a,b) => b.score - a.score || a.time - b.time);

  let unranked = Object.values(data).filter(p => p.score === 0);

  let html = "<h2>Classement :</h2>";

players.sort((a, b) => {
  if(b.score === a.score){
    return a.time - b.time;
  }
  return b.score - a.score;
});

players.forEach((p, i) => {
  let medal = "";

  if(i === 0) medal = "👑";
  else if(i === 1) medal = "🥈";
  else if(i === 2) medal = "🥉";

  html += `
    <div style="
      background: rgba(0,0,0,0.6);
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      font-size: 1.3em;
    ">
      ${medal} ${i+1}. ${p.name} - ${p.score} pts
    </div>
  `;
});

document.getElementById("ranking").innerHTML = html;
});
</script>
</body>
</html>
